<!-- phone/phone-preview.html -->
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Preview - Monogatari Game</title>
    
    <!-- Carica gli stili del telefono -->
    <link rel="stylesheet" href="phone.css">
    
    <style>
        /* Stili specifici per la preview */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1a1a2e;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .preview-header {
            color: white;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .preview-header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .preview-header p {
            color: #aaa;
        }
        
        /* Pannello di controllo */
        .control-panel {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            max-width: 600px;
            width: 100%;
        }
        
        .control-panel h3 {
            color: white;
            margin-bottom: 15px;
        }
        
        .scenario-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .btn {
            background: #4a4e69;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .btn:hover {
            background: #6c63ff;
            transform: translateY(-2px);
        }
        
        .btn.active {
            background: #6c63ff;
            box-shadow: 0 4px 15px rgba(108, 99, 255, 0.4);
        }
        
        .custom-message {
            display: flex;
            gap: 10px;
        }
        
        .custom-message input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #555;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        
        .custom-message select {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #555;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        
        /* Container per il telefono */
        #phone-container {
            position: relative;
            margin-top: 20px;
        }
        
        /* Il telefono è sempre visibile nella preview */
        #phone-overlay {
            position: relative !important;
            display: flex !important;
            margin: 0 auto;
        }
        
        .game-link {
            color: white;
            margin-top: 30px;
            text-align: center;
        }
        
        .game-link a {
            color: #6c63ff;
            text-decoration: none;
            font-weight: bold;
        }
        
        .game-link a:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>
    <div class="preview-header">
        <h1>📱 Phone System Preview</h1>
        <p>Testa il telefono prima di integrarlo nel gioco</p>
    </div>
    
    <div class="control-panel">
        <h3>Scenari predefiniti</h3>
        <div class="scenario-buttons">
            <button class="btn active" onclick="loadScenario('chat')">
                💬 Chat
            </button>
            <button class="btn" onclick="loadScenario('notification')">
                🔔 Notifica
            </button>
            <button class="btn" onclick="loadScenario('group')">
                👥 Gruppo
            </button>
            <button class="btn" onclick="loadScenario('empty')">
                📭 Vuoto
            </button>
        </div>
        
        <h3 style="margin-top: 20px;">Messaggio personalizzato</h3>
        <div class="custom-message">
            <input type="text" id="customText" placeholder="Scrivi un messaggio...">
            <select id="messageType">
                <option value="received">Ricevuto</option>
                <option value="sent">Inviato</option>
                <option value="system">Sistema</option>
            </select>
            <button class="btn" onclick="addCustomMessage()">➕ Aggiungi</button>
        </div>
    </div>
    
    <!-- Il telefono sarà inserito qui -->
    <div id="phone-container">
        <!-- Template del telefono -->
        <div id="phone-overlay">
            <div id="phone-screen">
                <div id="phone-header">
                    <span id="phone-signal">📶</span>
                    <span id="phone-time">12:00</span>
                    <span id="phone-battery">🔋 85%</span>
                </div>
                
                <div id="phone-content">
                    <!-- Messaggi dinamici -->
                </div>
                
                <div id="phone-nav">
                    <button id="phone-close-btn">
                        <span>✕</span> Chiudi
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="game-link">
        <p>👈 Torna al <a href="../index.html">gioco principale</a></p>
    </div>

    <script>
        // Mini sistema telefono per la preview
        class PhonePreview {
            constructor() {
                this.content = document.getElementById('phone-content');
                this.messages = [];
                this.updateTime();
                setInterval(() => this.updateTime(), 60000);
                
                // Event listener per chiudere (nella preview, nasconde solo i messaggi)
                document.getElementById('phone-close-btn').addEventListener('click', () => {
                    this.messages = [];
                    this.render();
                });
            }
            
            updateTime() {
                const timeElement = document.getElementById('phone-time');
                const now = new Date();
                const hours = now.getHours().toString().padStart(2, '0');
                const minutes = now.getMinutes().toString().padStart(2, '0');
                timeElement.textContent = `${hours}:${minutes}`;
            }
            
            setMessages(messages) {
                this.messages = [...messages];
                this.render();
            }
            
            addMessage(text, type = 'received', time = null) {
                if (!time) {
                    const now = new Date();
                    time = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
                }
                
                this.messages.push({ text, type, time });
                this.render();
                
                // Scrolla in fondo
                setTimeout(() => {
                    this.content.scrollTop = this.content.scrollHeight;
                }, 100);
            }
            
            render() {
                this.content.innerHTML = '';
                
                this.messages.forEach((msg, index) => {
                    const div = document.createElement('div');
                    div.className = `phone-message ${msg.type}`;
                    div.style.animationDelay = `${index * 0.05}s`;
                    div.textContent = msg.text;
                    
                    if (msg.time) {
                        const timeSpan = document.createElement('span');
                        timeSpan.className = 'message-time';
                        timeSpan.textContent = msg.time;
                        timeSpan.style.cssText = `
                            display: block;
                            font-size: 11px;
                            margin-top: 4px;
                            opacity: 0.7;
                        `;
                        div.appendChild(timeSpan);
                    }
                    
                    this.content.appendChild(div);
                });
                
                // Scrolla in fondo
                this.content.scrollTop = this.content.scrollHeight;
            }
        }
        
        // Inizializza
        const phone = new PhonePreview();
        
        // Scenari predefiniti
        const scenarios = {
            chat: [
                { text: 'Ciao! Come stai?', type: 'received', time: '14:30' },
                { text: 'Tutto bene, tu?', type: 'sent', time: '14:31' },
                { text: 'Fantastico! Ho appena finito il progetto 😊', type: 'received', time: '14:32' },
                { text: 'Congratulazioni!! 🎉', type: 'sent', time: '14:33' },
                { text: 'Grazie! Ci vediamo dopo per festeggiare?', type: 'received', time: '14:34' },
                { text: 'Certo! Alle 20 al solito posto?', type: 'sent', time: '14:35' },
                { text: 'Perfetto! A dopo 👋', type: 'received', time: '14:36' }
            ],
            
            notification: [
                { text: 'Hai una nuova notifica!', type: 'system', time: '09:15' },
                { text: 'Il tuo pacco è in consegna 📦', type: 'received', time: '09:15' },
                { text: 'Traccia il tuo ordine qui: bit.ly/track-123', type: 'received', time: '09:16' },
                { text: 'Grazie per l\'info!', type: 'sent', time: '09:20' }
            ],
            
            group: [
                { text: 'Gruppo "Viaggio Weekend"', type: 'system', time: 'Oggi' },
                { text: 'Ragazzi, chi porta la musica? 🎵', type: 'received', time: '16:00' },
                { text: 'Io ho lo speaker!', type: 'sent', time: '16:02' },
                { text: 'Perfetto! Io porto le bevande 🍹', type: 'received', time: '16:03' },
                { text: 'Ci vediamo alle 8 alla stazione', type: 'received', time: '16:05' },
                { text: 'Ok!! 🚂', type: 'sent', time: '16:06' }
            ],
            
            empty: [
                { text: 'Nessun nuovo messaggio', type: 'system', time: 'Ora' }
            ]
        };
        
        function loadScenario(name) {
            // Aggiorna i pulsanti attivi
            document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // Carica lo scenario
            phone.setMessages(scenarios[name]);
        }
        
        function addCustomMessage() {
            const text = document.getElementById('customText').value;
            const type = document.getElementById('messageType').value;
            
            if (text.trim()) {
                phone.addMessage(text, type);
                document.getElementById('customText').value = '';
            }
        }
        
        // Carica lo scenario chat di default
        loadScenario('chat');
        
        // Supporto invio con Enter
        document.getElementById('customText').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addCustomMessage();
            }
        });
    </script>
</body>
</html>
