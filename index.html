	<body>

		<!-- Fallback when JavaScript is not available -->

			<div class="middle text--center">

		<div id="monogatari">
			<visual-novel>
				<language-selection-screen></language-selection-screen>
				<loading-screen></loading-screen>
				<main-screen>
					<div class="main-title">Ciò che resta</div>
					<main-menu></main-menu>
				</main-screen>
				<game-screen>
					<dialog-log></dialog-log>
					<text-box></text-box>
					<quick-menu></quick-menu>
				</game-screen>
				<gallery-screen></gallery-screen>
				<credits-screen></credits-screen>
				<load-screen></load-screen>
				<save-screen></save-screen>
				<settings-screen></settings-screen>
				<help-screen></help-screen>
			</visual-novel>
		</div>

		
		<!--
			Pulsante globale del telefono.
			- Parte nascosto: PhoneToggle in js/main.js lo mostra solo durante le scene di gioco.
			- Il badge resta vuoto/nascosto finche PhoneUI non registra notifiche non lette.
			- aria-live="polite" permette ai lettori di schermo di annunciare il cambio numero senza interrompere.
		-->
		<div id="phone-toggle" class="phone-toggle" aria-hidden="true">
			<button
				id="phone-toggle-button"
				class="phone-toggle-button"
				type="button"
				aria-label="Apri telefono"
				aria-pressed="false"
			>
				<span class="phone-toggle-icon" aria-hidden="true"></span>
				<span id="phone-toggle-badge" class="phone-toggle-badge" aria-live="polite"></span>
			</button>
		</div>

		<!--
			Telefono in-game.
			Il telefono ha due viste:
			- chat: conversazione vera e propria;
			- lockscreen: vista iniziale quando il giocatore lo apre dal pulsante globale.
		-->
		<div id="phone-layer" class="phone-layer" aria-hidden="true">
			<div id="phone-shell" class="phone-shell">
				<div class="phone-speaker"></div>

				<div class="phone-screen">
					<!-- Status bar comune a tutte le viste del telefono. -->
					<div class="phone-status-bar" aria-label="Stato del telefono">
						<span id="phone-status-time" class="phone-status-time">00:00</span>
						<div class="phone-status-icons" aria-label="Segnale, rete e batteria">
							<span class="phone-signal-icon" aria-hidden="true">
								<span></span>
								<span></span>
								<span></span>
								<span></span>
							</span>
							<span class="phone-network-label">5G</span>
							<span class="phone-battery-icon" aria-hidden="true">
								<span></span>
							</span>
						</div>
					</div>

					<!-- Chat view (default visible) -->
					<div id="phone-chat-view">
						<div class="phone-header">
							<span id="phone-contact">Giulia</span>
							<span class="phone-status">online</span>
						</div>
						<div id="phone-chat" class="phone-chat"></div>
					</div>
					
					<!--
						Lockscreen.
						tabindex="0" la rende focalizzabile: cosi' si puo sbloccare anche con tastiera.
					-->
					<div id="phone-lock-view" tabindex="0" style="display: none;">
						<div class="phone-lock">
							<div class="lock-time" id="lock-time">15:30</div>
							<div id="phone-lock-date" class="lock-date">Tuesday, June 9</div>
							<div class="lock-icon"></div>
							<div class="lock-status">Locked</div>
							<!--
								Contenitore dinamico delle notifiche.
								Se PhoneUI non trova messaggi non letti, resta vuoto e la lockscreen rimane pulita.
							-->
							<div id="phone-lock-notifications" class="lock-notifications" aria-live="polite"></div>
							<div class="lock-hint">Tocca per sbloccare</div>
						</div>
					</div>
					
				</div>
			</div>
		</div>
